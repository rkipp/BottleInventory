<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Inventory</title>
</head>
<body>
    <header>
        <div class="center-group">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="logo">
            <h1>Edit Inventory</h1>
        </div>
        <nav>
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('bjcp') }}">Style Guide</a>
        </nav>
    </header>

    <form method="POST" id="editForm">
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>Bottle Size (oz)</th>
                    <th>Quantity</th>
                    <th>Filled With</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                {% for row in inventory %}
                <tr>
                    <td><input type="number" name="BottleSize" value="{{ row.BottleSize }}"></td>
                    <td><input type="number" name="Quantity" value="{{ row.Quantity }}"></td>
                    <td>
                        <select name="FilledWith" class="filled-select">
                            <option value="Empty" {% if row.FilledWith == 'Empty' or not row.FilledWith %}selected{% endif %}>Empty</option>
                            {% for batch in batches %}
                            <option value="{{ batch }}" {% if row.FilledWith == batch %}selected{% endif %}>{{ batch }}</option>
                            {% endfor %}
                            {% if row.FilledWith and row.FilledWith != 'Empty' and row.FilledWith not in batches %}
                            <option value="{{ row.FilledWith }}" selected>{{ row.FilledWith }}</option>
                            {% endif %}
                        </select>
                    </td>
                    <td><button type="button" class="delete-btn" onclick="deleteRow(this)">&#x2715;</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="add-row-wrapper">
            <button type="button" class="add-row-btn" onclick="addRow()">+ Add Row</button>
        </div>

        <div class="save-wrapper">
            <button type="submit" class="save-btn">Save Changes</button>
        </div>
    </form>

    <script>
        const batches = {{ batches | tojson }};

        function buildSelect(selectedValue) {
            let options = `<option value="Empty" ${!selectedValue || selectedValue === 'Empty' ? 'selected' : ''}>Empty</option>`;
            batches.forEach(b => {
                options += `<option value="${b}" ${selectedValue === b ? 'selected' : ''}>${b}</option>`;
            });
            // Preserve any value not already in the list
            if (selectedValue && selectedValue !== 'Empty' && !batches.includes(selectedValue)) {
                options += `<option value="${selectedValue}" selected>${selectedValue}</option>`;
            }
            return `<select name="FilledWith" class="filled-select">${options}</select>`;
        }

        function addRow() {
            const tbody = document.getElementById('tableBody');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="number" name="BottleSize" value="12"></td>
                <td><input type="number" name="Quantity" value="1"></td>
                <td>${buildSelect('')}</td>
                <td><button type="button" class="delete-btn" onclick="deleteRow(this)">&#x2715;</button></td>
            `;
            tbody.appendChild(tr);
            markDirty();
        }

        function deleteRow(btn) {
            btn.closest('tr').remove();
            markDirty();
        }

        // Unsaved changes warning
        let isDirty = false;
        function markDirty() { isDirty = true; }

        document.getElementById('editForm').addEventListener('input', markDirty);
        document.getElementById('editForm').addEventListener('submit', () => { isDirty = false; });

        window.addEventListener('beforeunload', (e) => {
            if (isDirty) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Nav links should also respect unsaved changes
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                if (isDirty && !confirm('You have unsaved changes. Leave anyway?')) {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
