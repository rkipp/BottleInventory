<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-wrap {
            max-width: 360px;
            margin: 60px auto;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-wrap h2 {
            text-align: center;
            color: var(--tertiary-color);
            margin: 0 0 24px 0;
        }
        .login-wrap input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 12px;
            color: var(--tertiary-color);
        }
        .login-wrap button {
            width: 100%;
            padding: 10px;
            background-color: var(--tertiary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-wrap button:hover { opacity: 0.85; }
        .login-error {
            color: var(--primary-color);
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="center-group">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="logo">
            <h1>Inventory</h1>
        </div>
    </header>

    <div class="login-wrap">
        <h2>Admin Login</h2>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
