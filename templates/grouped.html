<!DOCTYPE html>
<html lang="en">
<head style="background-color: #A6674C; font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        table { width: 50%; margin: auto; }
        .pill {
            display: block;
            background-color: var(--accent-color);
            color: var(--background-color);
            border-radius: 20px;
            padding: 3px 10px;
            margin: 2px auto;
            font-size: 13px;
            white-space: nowrap;
        }
        .total-oz { font-size: 12px; opacity: 0.65; margin-top: 3px; }
    </style>
    <title>Inventory</title>
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="logo">
        <h1>Grouped Inventory</h1>
    </header>
    <h1 align="center">Beer Bottle Inventory</h1>
    <table>
        <thead>
            <tr>
                <th>Beer</th>
                <th>Bottles</th>
            </tr>
        </thead>
        <tbody>
        {% for item in inventory %}
        <tr>
            <td>
                {{ item.name }}
                <div class="total-oz">{{ (item.total_oz / 128) | round(2) }} gal</div>
            </td>
            <td>
                {% for b in item.bottles %}
                <span class="pill">{{ b.qty }} &times; {{ b.size }}oz</span>
                {% endfor %}
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <div style="text-align: center; margin-top: 40px; margin-bottom: 40px;" class="footer-link">
        <a href="{{ url_for('index') }}">Edit</a>
    </div>
</body>
</html>
